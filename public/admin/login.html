<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin login — Movie Ticket Booking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
  </head>
  <body class="auth-standalone">
    <div class="auth-wrap">
      <div class="auth-card auth-card--admin">
        <p class="auth-brand mb-0">Admin portal</p>
        <p class="auth-sub">Sign in to manage movies, shows, and bookings.</p>
        <div id="alert" class="alert alert-soft d-none" role="alert"></div>
        <form id="form">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required autocomplete="email" />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              name="password"
              required
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn btn-accent w-100">Admin sign in</button>
        </form>
        <div class="auth-footer">
          <p class="mb-2">
            <a href="/">← Public site</a>
            ·
            <a href="/login.html">Customer login</a>
          </p>
          <p class="mb-0 text-secondary small">Demo: admin@movies.com / Admin@123</p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
      const form = document.getElementById('form');
      const alertEl = document.getElementById('alert');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alertEl.classList.add('d-none');
        const fd = new FormData(form);
        try {
          const data = await API.request('/login', {
            method: 'POST',
            body: { email: fd.get('email'), password: fd.get('password') },
          });
          if (data.user.role !== 'admin') {
            alertEl.textContent =
              'This page is for administrators only. Use customer login to book tickets.';
            alertEl.classList.remove('d-none');
            return;
          }
          API.setSession(data.token, data.user);
          window.location.href = '/admin/dashboard.html';
        } catch (err) {
          alertEl.textContent = err.message || 'Invalid email or password';
          alertEl.classList.remove('d-none');
        }
      });
    </script>
  </body>
</html>
