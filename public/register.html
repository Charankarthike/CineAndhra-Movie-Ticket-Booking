<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register — Movie Ticket Booking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-dark border-bottom border-secondary mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">Online Movie Tickets</a>
        <a class="btn btn-outline-light btn-sm" href="/login.html">Login</a>
      </div>
    </nav>
    <div class="container" style="max-width: 420px">
      <h1 class="h3 mb-3">Create account</h1>
      <div id="alert" class="alert alert-soft d-none" role="alert"></div>
      <form id="form">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" name="name" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" minlength="6" required />
        </div>
        <button type="submit" class="btn btn-accent w-100">Register</button>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
      document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertEl = document.getElementById('alert');
        alertEl.classList.add('d-none');
        const fd = new FormData(e.target);
        try {
          await API.request('/register', {
            method: 'POST',
            body: {
              name: fd.get('name'),
              email: fd.get('email'),
              password: fd.get('password'),
            },
          });
          window.location.href = '/login.html';
        } catch (err) {
          alertEl.textContent = err.message || 'Registration failed';
          alertEl.classList.remove('d-none');
        }
      });
    </script>
  </body>
</html>
