<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Telugu Movies — Book Your Tickets Online</title>
    <meta name="description" content="Book tickets for the latest Telugu blockbusters. Pushpa 2, Kalki 2898 AD, RRR, Baahubali and more — now showing near you." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">🎥 CineAndhra</a>
        <div class="d-flex gap-2 align-items-center">
          <span id="userLabel" class="text-secondary small d-none"></span>
          <a class="btn btn-link btn-sm text-secondary px-1" href="/admin/login.html" id="btnStaff">Staff</a>
          <a class="btn btn-outline-light btn-sm d-none" href="/my-bookings.html" id="btnMyBookings">My Bookings</a>
          <a class="btn btn-outline-light btn-sm" href="/login.html" id="btnLogin">Login</a>
          <button type="button" class="btn btn-outline-secondary btn-sm d-none" id="btnLogout">Logout</button>
          <a class="btn btn-outline-light btn-sm d-none" href="/admin/dashboard.html" id="btnAdmin">Dashboard</a>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div class="container">
        <div class="hero-eyebrow">Now Showing in Telugu</div>
        <h1 class="hero-title">Big Screen,<br/>Bigger Experience</h1>
        <p class="hero-subtitle">Book tickets for the hottest Telugu blockbusters playing near you today.</p>
        <hr class="hero-divider" />
      </div>
    </section>

    <!-- MOVIES GRID -->
    <section class="container pb-5">
      <div class="d-flex align-items-end justify-content-between mb-4">
        <div>
          <p class="section-label mb-1">✦ Now Playing</p>
          <h2 class="section-title">Telugu Blockbusters</h2>
        </div>
        <span id="movieCount" class="text-muted small"></span>
      </div>

      <div id="alert" class="alert alert-danger d-none mb-4"></div>
      <div class="row g-4" id="grid"></div>
    </section>

    <!-- FOOTER -->
    <footer class="border-top py-4 mt-2" style="border-color: var(--border) !important;">
      <div class="container text-center">
        <p class="mb-0" style="color: var(--text-muted); font-size: 0.82rem;">
          © 2025 CineAndhra &nbsp;·&nbsp; Book smarter. Watch bigger.
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
      function refreshNav() {
        const u = API.getUser();
        const login = document.getElementById('btnLogin');
        const logout = document.getElementById('btnLogout');
        const admin = document.getElementById('btnAdmin');
        const label = document.getElementById('userLabel');
        const staff = document.getElementById('btnStaff');
        const myBookings = document.getElementById('btnMyBookings');
        if (u) {
          login.classList.add('d-none');
          staff.classList.add('d-none');
          logout.classList.remove('d-none');
          label.classList.remove('d-none');
          label.textContent = u.name;
          admin.classList.toggle('d-none', u.role !== 'admin');
          myBookings.classList.toggle('d-none', u.role === 'admin');
        } else {
          login.classList.remove('d-none');
          staff.classList.remove('d-none');
          logout.classList.add('d-none');
          label.classList.add('d-none');
          admin.classList.add('d-none');
          myBookings.classList.add('d-none');
        }
      }

      document.getElementById('btnLogout').addEventListener('click', () => {
        API.clearSession();
        refreshNav();
      });

      function durationLabel(min) {
        const h = Math.floor(min / 60), m = min % 60;
        return h ? `${h}h ${m}m` : `${m}m`;
      }

      async function load() {
        const grid = document.getElementById('grid');
        const alertEl = document.getElementById('alert');
        const countEl = document.getElementById('movieCount');
        try {
          const movies = await API.request('/movies');
          countEl.textContent = `${movies.length} movie${movies.length !== 1 ? 's' : ''} available`;
          grid.innerHTML = movies.map((m) => `
            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
              <div class="movie-card h-100 d-flex flex-column">
                <div class="movie-poster-frame">
                  <span class="lang-badge">Telugu</span>
                  ${m.poster_url
                    ? `<img class="movie-poster-img" src="${escapeAttr(m.poster_url)}" alt="${escapeAttr(m.title)}" loading="lazy"
                          onerror="this.classList.add('d-none');this.nextElementSibling.classList.remove('d-none');" />
                       <div class="movie-poster-placeholder d-none">${escapeHtml(m.title)}</div>`
                    : `<div class="movie-poster-placeholder">${escapeHtml(m.title)}</div>`
                  }
                </div>
                <div class="movie-card-body d-flex flex-column flex-grow-1">
                  <h3 class="movie-card-title">${escapeHtml(m.title)}</h3>
                  <p class="movie-card-meta">${durationLabel(m.duration)}</p>
                  <p class="movie-card-desc flex-grow-1">${escapeHtml(m.description || '')}</p>
                  <a class="btn-book" href="/movie-detail.html?id=${m.movie_id}">Book Now</a>
                </div>
              </div>
            </div>`).join('');
        } catch (e) {
          alertEl.textContent = e.message || 'Could not load movies';
          alertEl.classList.remove('d-none');
        }
      }

      function escapeHtml(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }
      function escapeAttr(s) {
        return String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
      }

      refreshNav();
      load();
    </script>
  </body>
</html>
