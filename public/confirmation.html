<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Booking Confirmed — Movie Ticket Booking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-dark border-bottom border-secondary mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">Online Movie Tickets</a>
      </div>
    </nav>
    <div class="container pb-5" style="max-width: 640px">
      <h1 class="h3 booking-confirmation-title mb-3">Booking confirmation</h1>
      <div id="alert" class="alert alert-danger d-none"></div>
      <div id="box" class="card booking-confirmation-card d-none">
        <div class="card-body">
          <ul class="booking-details list-unstyled mb-0">
            <li class="booking-detail-row">
              <span class="booking-detail-label">Booking ID</span>
              <span class="booking-detail-value" id="bid"></span>
            </li>
            <li class="booking-detail-row">
              <span class="booking-detail-label">Movie</span>
              <span class="booking-detail-value" id="movie"></span>
            </li>
            <li class="booking-detail-row">
              <span class="booking-detail-label">Theater</span>
              <span class="booking-detail-value" id="theater"></span>
            </li>
            <li class="booking-detail-row">
              <span class="booking-detail-label">Show time</span>
              <span class="booking-detail-value booking-detail-value--muted" id="time"></span>
            </li>
            <li class="booking-detail-row">
              <span class="booking-detail-label">Seats</span>
              <span class="booking-detail-value booking-detail-value--seats" id="seats"></span>
            </li>
            <li class="booking-detail-row booking-detail-row--total">
              <span class="booking-detail-label">Total</span>
              <span class="booking-detail-value booking-detail-value--total" id="total"></span>
            </li>
            <li class="booking-detail-row booking-detail-row--status">
              <span class="booking-detail-label">Status</span>
              <span class="booking-detail-value" id="status"></span>
            </li>
          </ul>
          <div class="mt-4 pt-2 border-top border-secondary border-opacity-25">
          <button type="button" class="btn btn-outline-danger btn-sm" id="cancelBtn">
            Cancel booking (refund simulated)
          </button>
          <a class="btn btn-outline-light btn-sm ms-2" href="/">Home</a>
          <a class="btn btn-outline-secondary btn-sm ms-2" href="/my-bookings.html">My bookings</a>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/currency.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const bookingId = params.get('booking_id');
      const alertEl = document.getElementById('alert');

      async function load() {
        if (!API.getToken()) {
          alertEl.textContent = 'Please sign in to view this booking.';
          alertEl.classList.remove('d-none');
          return;
        }
        if (!bookingId) {
          alertEl.textContent = 'Missing booking id';
          alertEl.classList.remove('d-none');
          return;
        }
        try {
          const data = await API.request('/booking/' + bookingId);
          const b = data.booking;
          document.getElementById('box').classList.remove('d-none');
          document.getElementById('bid').textContent = bookingId;
          document.getElementById('movie').textContent = b.movie_title;
          document.getElementById('theater').textContent = b.theater_name;
          document.getElementById('time').textContent = new Date(b.show_time).toLocaleString();
          document.getElementById('seats').textContent = data.seats
            .map((s) => s.seat_number)
            .join(', ');
          document.getElementById('total').textContent = formatInr(b.total_price);
          const statusEl = document.getElementById('status');
          statusEl.textContent = b.status;
          const st = (b.status || 'unknown').replace(/_/g, '-');
          statusEl.className =
            'booking-detail-value booking-status booking-status--' + st;
          document.getElementById('cancelBtn').style.display =
            b.status === 'confirmed' ? 'inline-block' : 'none';
        } catch (e) {
          alertEl.textContent = e.message || 'Could not load booking';
          alertEl.classList.remove('d-none');
        }
      }

      document.getElementById('cancelBtn').addEventListener('click', async () => {
        alertEl.classList.add('d-none');
        try {
          await API.request('/cancel-booking', {
            method: 'POST',
            body: { booking_id: Number(bookingId) },
          });
          await load();
        } catch (e) {
          alertEl.textContent = e.message || 'Cancel failed';
          alertEl.classList.remove('d-none');
        }
      });

      load();
    </script>
  </body>
</html>
