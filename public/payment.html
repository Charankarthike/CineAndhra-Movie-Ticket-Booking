<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment — Movie Ticket Booking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-dark border-bottom border-secondary mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">Online Movie Tickets</a>
      </div>
    </nav>
    <div class="container" style="max-width: 520px">
      <h1 class="h3 mb-3">Simulated payment</h1>
      <div id="alert" class="alert alert-soft d-none"></div>
      <div id="box" class="card bg-dark border-secondary text-white d-none">
        <div class="card-body">
          <p>Booking #<span id="bid" class="text-accent"></span></p>
          <p class="h4 text-accent" id="amt"></p>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="fail" />
            <label class="form-check-label" for="fail">Simulate payment failure</label>
          </div>
          <button type="button" class="btn btn-accent" id="payBtn">Pay now</button>
        </div>
      </div>
      <p class="text-secondary small mt-3 d-none" id="needLogin">
        <a href="/login.html">Sign in</a> to pay.
      </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/currency.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      let bookingId =
        params.get('booking_id') || sessionStorage.getItem('pending_booking_id');
      const alertEl = document.getElementById('alert');

      function showErr(msg) {
        alertEl.textContent = msg;
        alertEl.classList.remove('d-none');
      }

      (async function () {
        if (!API.getToken()) {
          document.getElementById('needLogin').classList.remove('d-none');
          return;
        }
        if (!bookingId) {
          showErr('No booking specified.');
          return;
        }
        try {
          const data = await API.request('/booking/' + bookingId);
          document.getElementById('box').classList.remove('d-none');
          document.getElementById('bid').textContent = bookingId;
          document.getElementById('amt').textContent =
            formatInr(data.booking.total_price);
        } catch (e) {
          showErr(e.message || 'Could not load booking');
        }

        document.getElementById('payBtn').addEventListener('click', async () => {
          alertEl.classList.add('d-none');
          const fail = document.getElementById('fail').checked;
          try {
            await API.request('/payment', {
              method: 'POST',
              body: { booking_id: Number(bookingId), simulate_failure: fail },
            });
            sessionStorage.removeItem('pending_booking_id');
            window.location.href =
              '/confirmation.html?booking_id=' + encodeURIComponent(bookingId);
          } catch (e) {
            showErr(e.message || 'Payment error');
            if (e.status === 402) {
              sessionStorage.removeItem('pending_booking_id');
            }
          }
        });
      })();
    </script>
  </body>
</html>
