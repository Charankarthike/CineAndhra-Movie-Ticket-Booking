<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My bookings — Movie Ticket Booking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-dark border-bottom border-secondary mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">Online Movie Tickets</a>
        <div class="d-flex gap-2 flex-wrap align-items-center">
          <a class="btn btn-outline-light btn-sm" href="/">Movies</a>
          <button type="button" class="btn btn-outline-secondary btn-sm d-none" id="btnLogout">
            Logout
          </button>
        </div>
      </div>
    </nav>
    <div class="container pb-5">
      <h1 class="h3 mb-2">My bookings</h1>
      <p class="text-secondary small mb-4">
        Shows you have booked: number of tickets, screen, date &amp; time, and status.
      </p>
      <div id="alert" class="alert alert-warning d-none"></div>
      <div id="needLogin" class="alert alert-secondary d-none">
        <a href="/login.html">Sign in</a> to see your booking history.
      </div>
      <div id="content" class="d-none">
        <div id="empty" class="text-secondary d-none">You have no bookings yet.</div>
        <div class="table-responsive">
          <table class="table table-dark table-striped table-hover align-middle d-none" id="tbl">
            <thead>
              <tr>
                <th>#</th>
                <th>Movie</th>
                <th>Theater</th>
                <th>Show</th>
                <th class="text-center">Tickets</th>
                <th>Seat(s)</th>
                <th>Total</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/currency.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
      function fmt(dt) {
        return new Date(dt).toLocaleString(undefined, {
          weekday: 'short',
          month: 'short',
          day: 'numeric',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
        });
      }

      function statusClass(s) {
        if (s === 'confirmed') return 'text-success';
        if (s === 'cancelled') return 'text-danger';
        if (s === 'pending_payment') return 'text-warning';
        if (s === 'payment_failed') return 'text-danger';
        return 'text-secondary';
      }

      function escapeHtml(t) {
        const d = document.createElement('div');
        d.textContent = t == null ? '' : String(t);
        return d.innerHTML;
      }

      document.getElementById('btnLogout').addEventListener('click', () => {
        API.clearSession();
        window.location.href = '/login.html';
      });

      (async function () {
        const alertEl = document.getElementById('alert');
        const needLogin = document.getElementById('needLogin');
        const content = document.getElementById('content');
        if (!API.getToken()) {
          needLogin.classList.remove('d-none');
          return;
        }
        document.getElementById('btnLogout').classList.remove('d-none');
        try {
          const u = API.getUser();
          if (u && u.role === 'admin') {
            alertEl.textContent =
              'Admin accounts use the dashboard for all bookings. This page lists your personal bookings only.';
            alertEl.classList.remove('d-none');
          }
          const rows = await API.request('/my-bookings');
          content.classList.remove('d-none');
          const tbody = document.getElementById('tbody');
          const tbl = document.getElementById('tbl');
          const empty = document.getElementById('empty');
          if (!rows.length) {
            empty.classList.remove('d-none');
            return;
          }
          tbl.classList.remove('d-none');
          tbody.innerHTML = rows
            .map(
              (r) => `
            <tr>
              <td>${r.booking_id}</td>
              <td>${escapeHtml(r.movie_title)}</td>
              <td>
                ${escapeHtml(r.theater_name)}<br />
                <span class="small text-secondary">${escapeHtml(r.theater_location)}</span>
              </td>
              <td class="text-nowrap small">${fmt(r.show_time)}</td>
              <td class="text-center fw-semibold">${r.ticket_count}</td>
              <td class="small">${escapeHtml(r.seats || '—')}</td>
              <td>${formatInr(r.total_price)}</td>
              <td class="${statusClass(r.status)} small text-capitalize">${escapeHtml(
                (r.status || '').replace(/_/g, ' ')
              )}</td>
              <td>
                <a class="btn btn-sm btn-outline-light" href="/confirmation.html?booking_id=${r.booking_id}">Details</a>
              </td>
            </tr>`
            )
            .join('');
        } catch (e) {
          needLogin.classList.add('d-none');
          content.classList.remove('d-none');
          alertEl.textContent = e.message || 'Could not load bookings';
          alertEl.classList.remove('d-none');
        }
      })();
    </script>
  </body>
</html>
